# Aiki configuration
# Copy to ~/.config/aiki/config.toml
# All settings are optional — defaults are shown below.

# ─── Shell ───────────────────────────────────────────────────────────────────

[shell]
program = "/bin/zsh"         # Shell binary path (default: $SHELL or /bin/zsh)
args = ["-l"]                # Shell arguments (default: login shell)

# ─── Appearance ──────────────────────────────────────────────────────────────

[appearance]
font_family = '"SF Mono", "Menlo", "Monaco", "Cascadia Code", monospace'
font_size = 14
cursor_blink = true
scrollback = 10000           # Max lines kept in scroll buffer

[appearance.theme]
background = "#1a1a2e"
foreground = "#e0e0e0"
cursor = "#e0e0e0"
selection_background = "#3a3a5e"

# ─── AI Provider ─────────────────────────────────────────────────────────────
#
# provider  — identifies which API format to use:
#             "anthropic" uses the Claude Messages API
#             anything else uses the OpenAI-compatible Chat Completions API
# model     — model ID passed to the API
# base_url  — API base URL (without /chat/completions or /messages suffix)
#
# API keys are stored in the macOS Keychain under the provider name.
# On first launch, Aiki prompts you to enter the key for your configured provider.

# ── Gemini (default) ──

[ai]
provider = "gemini"
model = "gemini-2.5-flash"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"

